<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/main}">
<head><meta charset="UTF-8"></head>
<body>
<div layout:fragment="dynamicHeader">
    <div th:replace="~{fragments/header :: headerInfo('Chi Tiết Sách')}"></div>
</div>
<main layout:fragment="content">
    <h2>Thông tin chi tiết</h2>
    <div th:if="${book != null}" style="border: 1px solid #ccc; padding: 20px; border-radius: 5px;">
        <p><strong>Mã ID:</strong> <span th:text="${book.id}"></span></p>
        <p><strong>Tên Sách:</strong> <span th:text="${book.title}"></span></p>
        <p><strong>Tác Giả:</strong> <span th:text="${book.author}"></span></p>
        <p><strong>Giá Bán:</strong> <span th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span></p>
        <br/>
        <a th:href="@{/books}" style="padding: 8px 15px; background-color: #007bff; color: white; text-decoration: none; border-radius: 4px;">Quay lại danh sách</a>
    </div>
    <div th:if="${book == null}">
        <p style="color: red;">Không tìm thấy sách yêu cầu!</p>
        <a th:href="@{/books}">Quay lại danh sách</a>
    </div>
</main>
</body>
</html>
