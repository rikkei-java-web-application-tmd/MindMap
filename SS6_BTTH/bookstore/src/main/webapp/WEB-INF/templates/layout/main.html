<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title>Book Store</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        table, th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #eaeaea; }
        .highlight-row { background-color: #ffe6e6; color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>
<div layout:fragment="dynamicHeader"></div>
<div class="container">
    <main layout:fragment="content"></main>
</div>
<div th:replace="~{fragments/footer :: footerInfo}"></div>
</body>
</html>
